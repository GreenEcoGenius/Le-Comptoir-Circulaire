<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Comptoir Circulaire - GreenEcoGenius</title>
    
    <!-- Tailwind CSS & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" xintegrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --color-dark-bg: #0a2c38; 
            --color-secondary-bg: #1a3a45;
            --color-card-bg: #112f3b;
            --color-text: #d0e0e3;    
            --color-text-white: #ffffff;
            --color-primary: #5affb5; 
            --color-primary-darker: #49db9f;
            --color-danger: #ff5a5a;
            --font-main: 'Poppins', sans-serif;
        }
        body {
            font-family: var(--font-main);
            background-color: var(--color-dark-bg);
            color: var(--color-text);
        }
        /* --- Styles Généraux --- */
        #le-comptoir-app h1, #le-comptoir-app h2, #le-comptoir-app h3, #le-comptoir-app h4, #le-comptoir-app label {
            color: var(--color-text-white) !important;
        }
        .tag { background-color: var(--color-secondary-bg); color: var(--color-primary) !important; }
        .tag-own { background-color: var(--color-primary); color: var(--color-dark-bg) !important; }

        /* --- Améliorations visuelles --- */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal-backdrop { animation: fadeIn 0.3s ease-in-out; }
        .modal-content { animation: slideInUp 0.4s ease-in-out; }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Formulaires --- */
        .form-input, .form-select {
            background-color: var(--color-dark-bg) !important;
            color: var(--color-text-white) !important;
            border: 1px solid var(--color-secondary-bg);
        }
        .form-select option { background-color: var(--color-dark-bg); color: var(--color-text-white); }
        .btn-primary-text { color: var(--color-dark-bg) !important; }
        .btn-danger { background-color: var(--color-danger); color: white; }

        /* --- Dropdown Menu --- */
        .dropdown:hover .dropdown-menu { display: block; }
    </style>
</head>
<body id="le-comptoir-app" class="relative">

    <!-- En-tête de l'application -->
    <header class="bg-[var(--color-secondary-bg)] shadow-lg sticky top-0 z-40">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">Le Comptoir Circulaire</h1>
                <p class="text-sm">Par GreenEcoGenius</p>
            </div>
            <!-- Boutons qui changent en fonction de l'état de connexion -->
            <div id="auth-container" class="flex items-center gap-4">
                <!-- État déconnecté (visible par défaut, masqué par JS) -->
                <div id="logged-out-view">
                    <button id="open-login-modal-btn" class="font-semibold hover:text-white transition duration-300">Connexion</button>
                    <button id="open-register-modal-btn" class="bg-[var(--color-primary)] text-[var(--color-dark-bg)] font-bold py-2 px-6 rounded-full hover:bg-[var(--color-primary-darker)] transition duration-300">Inscription</button>
                </div>
                <!-- État connecté -->
                <div id="logged-in-view" class="hidden flex items-center gap-4">
                    <button id="open-sell-modal-btn" class="bg-[var(--color-primary)] text-[var(--color-dark-bg)] font-bold py-2 px-6 rounded-full hover:bg-[var(--color-primary-darker)] transition duration-300">
                        <i class="fas fa-plus-circle mr-2"></i>Vendre un lot
                    </button>
                    <div class="relative dropdown">
                        <button id="account-menu-btn" class="w-10 h-10 bg-[var(--color-dark-bg)] rounded-full flex items-center justify-center text-xl font-bold text-white uppercase"></button>
                        <div class="dropdown-menu absolute right-0 mt-2 w-48 bg-[var(--color-secondary-bg)] rounded-md shadow-xl z-20 hidden">
                            <a href="#" id="open-account-btn" class="block px-4 py-2 text-sm text-white hover:bg-[var(--color-card-bg)]">Mon Compte</a>
                            <a href="#" id="logout-btn" class="block px-4 py-2 text-sm text-white hover:bg-[var(--color-card-bg)]">Déconnexion</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Corps principal -->
    <main class="container mx-auto px-6 py-8">
        <div class="bg-[var(--color-secondary-bg)] p-6 rounded-lg shadow-xl mb-8">
             <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <div class="md:col-span-2 lg:col-span-2">
                    <label for="search-input" class="block mb-2 text-sm font-medium">Rechercher un matériau</label>
                    <div class="relative"><span class="absolute inset-y-0 left-0 flex items-center pl-3"><i class="fas fa-search text-gray-400"></i></span><input type="text" id="search-input" class="form-input w-full rounded-lg py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)]" placeholder="Ex: Plastique HDPE, Cuivre..."></div>
                </div>
                <div>
                    <label for="category-filter" class="block mb-2 text-sm font-medium">Catégorie</label>
                    <select id="category-filter" class="form-select w-full rounded-lg py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)]">
                        <option value="all">Toutes</option><option value="Plastiques">Plastiques</option><option value="Métaux">Métaux</option><option value="Papiers/Cartons">Papiers/Cartons</option><option value="Verre">Verre</option><option value="Bois">Bois</option>
                    </select>
                </div>
                <div>
                    <label for="country-filter" class="block mb-2 text-sm font-medium">Pays</label>
                    <select id="country-filter" class="form-select w-full rounded-lg py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)]">
                        <option value="all">Tous</option><option value="France">France</option><option value="Allemagne">Allemagne</option><option value="Italie">Italie</option><option value="Espagne">Espagne</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <div class="w-full lg:w-2/3">
                <h2 class="text-xl font-semibold mb-4">Stock disponible en temps réel</h2>
                <div id="materials-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6 min-h-[300px]">
                    <p id="loading-indicator" class="col-span-full text-center">Veuillez vous connecter pour voir les lots...</p>
                </div>
            </div>
            <aside class="w-full lg:w-1/3">
                <div class="bg-[var(--color-secondary-bg)] p-6 rounded-lg shadow-xl sticky top-8">
                    <h3 class="text-xl font-semibold mb-4">Aperçu du Marché</h3>
                    <div><canvas id="volumeChart"></canvas></div>
                </div>
            </aside>
        </div>
    </main>

    <!-- --- MODALES --- -->

    <!-- Modale Vendre un lot -->
    <div id="sell-material-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 z-50 flex justify-center items-center p-4 modal-backdrop">
         <div class="bg-[var(--color-secondary-bg)] rounded-lg shadow-2xl p-8 w-full max-w-2xl modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold">Vendre un nouveau lot</h2>
                <button data-close-modal="sell-material-modal" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            <form id="add-material-form" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label for="material-name" class="block mb-2 text-sm">Nom du matériau</label><input type="text" id="material-name" placeholder="Ex: PET Recyclé" required class="form-input w-full rounded-lg p-2"></div>
                    <div><label for="material-category" class="block mb-2 text-sm">Catégorie</label><select id="material-category" required class="form-select w-full rounded-lg p-2"><option value="Plastiques">Plastiques</option><option value="Métaux">Métaux</option><option value="Papiers/Cartons">Papiers/Cartons</option><option value="Verre">Verre</option><option value="Bois">Bois</option></select></div>
                    <div><label for="material-quantity" class="block mb-2 text-sm">Quantité</label><input type="number" step="0.01" id="material-quantity" placeholder="10.5" required class="form-input w-full rounded-lg p-2"></div>
                    <div><label for="material-unit" class="block mb-2 text-sm">Unité</label><select id="material-unit" required class="form-select w-full rounded-lg p-2"><option value="tonnes">tonnes</option><option value="kg">kg</option><option value="m³">m³</option></select></div>
                    <div><label for="material-price" class="block mb-2 text-sm">Prix par unité (€)</label><input type="number" step="0.01" id="material-price" placeholder="550.00" required class="form-input w-full rounded-lg p-2"></div>
                    <div><label for="material-location" class="block mb-2 text-sm">Localisation</label><input type="text" id="material-location" placeholder="Lyon, France" required class="form-input w-full rounded-lg p-2"></div>
                </div>
                <div class="mt-8 flex justify-end">
                    <button id="submit-material-btn" type="submit" class="bg-[var(--color-primary)] font-bold py-3 px-8 rounded-full hover:bg-[var(--color-primary-darker)] transition duration-300 w-48 text-center">
                        <span class="btn-text btn-primary-text">Mettre en vente</span>
                        <span class="btn-spinner hidden btn-primary-text"><i class="fas fa-spinner fa-spin"></i></span>
                    </button>
                </div>
                 <p id="sell-form-error" class="text-red-400 mt-4 text-right"></p>
            </form>
        </div>
    </div>
    
    <!-- Modale Connexion -->
    <div id="login-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 z-50 flex justify-center items-center p-4 modal-backdrop">
        <div class="bg-[var(--color-secondary-bg)] rounded-lg shadow-2xl p-8 w-full max-w-md modal-content">
            <div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold">Connexion</h2><button data-close-modal="login-modal" class="text-gray-400 hover:text-white text-2xl">&times;</button></div>
            <form id="login-form">
                <div class="space-y-4">
                    <div><label for="login-email" class="block mb-2 text-sm">Email</label><input type="email" id="login-email" required class="form-input w-full rounded-lg p-2"></div>
                    <div><label for="login-password" class="block mb-2 text-sm">Mot de passe</label><input type="password" id="login-password" required class="form-input w-full rounded-lg p-2"></div>
                </div>
                <div class="mt-8 flex justify-end"><button type="submit" class="bg-[var(--color-primary)] btn-primary-text font-bold py-3 px-8 rounded-full w-full">Se connecter</button></div>
                <p id="login-error" class="text-red-400 mt-4 text-center"></p>
            </form>
        </div>
    </div>

    <!-- Modale Inscription -->
    <div id="register-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 z-50 flex justify-center items-center p-4 modal-backdrop">
         <div class="bg-[var(--color-secondary-bg)] rounded-lg shadow-2xl p-8 w-full max-w-md modal-content">
            <div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold">Créer un compte</h2><button data-close-modal="register-modal" class="text-gray-400 hover:text-white text-2xl">&times;</button></div>
            <form id="register-form">
                <div class="space-y-4">
                    <div><label for="register-name" class="block mb-2 text-sm">Nom ou Entreprise</label><input type="text" id="register-name" required class="form-input w-full rounded-lg p-2"></div>
                    <div><label for="register-email" class="block mb-2 text-sm">Email</label><input type="email" id="register-email" required class="form-input w-full rounded-lg p-2"></div>
                    <div><label for="register-password" class="block mb-2 text-sm">Mot de passe (6 caractères min.)</label><input type="password" id="register-password" required class="form-input w-full rounded-lg p-2"></div>
                </div>
                <div class="mt-8 flex justify-end"><button type="submit" class="bg-[var(--color-primary)] btn-primary-text font-bold py-3 px-8 rounded-full w-full">S'inscrire</button></div>
                <p id="register-error" class="text-red-400 mt-4 text-center"></p>
            </form>
        </div>
    </div>
    
    <!-- Modale Mon Compte -->
    <div id="account-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 z-50 flex justify-center items-center p-4 modal-backdrop">
        <!-- Contenu injecté par JavaScript -->
    </div>
    
    <!-- Modale de confirmation d'achat -->
    <div id="buy-confirmation-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 z-50 flex justify-center items-center p-4 modal-backdrop">
        <div class="bg-[var(--color-secondary-bg)] rounded-lg shadow-2xl p-8 w-full max-w-md modal-content text-center">
            <h2 class="text-2xl font-bold mb-4">Confirmer l'achat</h2>
            <p id="buy-confirmation-text" class="mb-6">Êtes-vous sûr de vouloir acheter ce lot ?</p>
            <div class="flex justify-center gap-4">
                <button data-close-modal="buy-confirmation-modal" class="bg-gray-500 text-white font-bold py-2 px-6 rounded-full">Annuler</button>
                <button id="confirm-buy-btn" class="btn-danger font-bold py-2 px-6 rounded-full">Confirmer</button>
            </div>
        </div>
    </div>


    <!-- Scripts Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, getDoc, writeBatch, setDoc, query, where, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        document.addEventListener('DOMContentLoaded', function() {
            const firebaseConfig = {
              apiKey: "AIzaSyB0tQRqJaOgqIi7Sbk0v1JPJZbSabzMmBo",
              authDomain: "greenecogenius.firebaseapp.com",
              projectId: "greenecogenius",
              storageBucket: "greenecogenius.firebasestorage.app",
              messagingSenderId: "201115761499",
              appId: "1:201115761499:web:87f9961ff40f8a5e04387e",
              measurementId: "G-LNSR09QLWD"
            };

            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);
            
            let allMaterials = [];
            let currentUser = null;
            let currentUserData = {};
            let materialsListener = null; 
            
            const ui = {
                loggedOutView: document.getElementById('logged-out-view'),
                loggedInView: document.getElementById('logged-in-view'),
                accountMenuBtn: document.getElementById('account-menu-btn'),
                grid: document.getElementById('materials-grid'),
                loadingIndicator: document.getElementById('loading-indicator'),
                
                update: async (user) => {
                    if (materialsListener) {
                        materialsListener(); 
                    }

                    if (user) {
                        currentUser = user;
                        const userDoc = await getDoc(doc(db, 'users', user.uid));
                        if(userDoc.exists()) {
                            currentUserData = userDoc.data();
                            ui.accountMenuBtn.textContent = (currentUserData.name || currentUserData.email)[0].toUpperCase();
                        }
                        ui.loggedOutView.classList.add('hidden');
                        ui.loggedInView.classList.remove('hidden');

                        const materialsCol = collection(db, 'materials');
                        materialsListener = onSnapshot(materialsCol, snapshot => {
                            allMaterials = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                            ui.loadingIndicator.style.display = 'none';
                            displayMaterials();
                        }, error => {
                            ui.loadingIndicator.textContent = 'Erreur de lecture des données.';
                            console.error(error);
                        });

                    } else {
                        currentUser = null;
                        currentUserData = {};
                        allMaterials = []; 
                        ui.loggedOutView.classList.remove('hidden');
                        ui.loggedInView.classList.add('hidden');
                        ui.loadingIndicator.style.display = '';
                        ui.loadingIndicator.textContent = "Veuillez vous connecter pour voir les lots.";
                        displayMaterials();
                    }
                }
            };
            
            function displayMaterials() {
                const search = document.getElementById('search-input').value.toLowerCase();
                const category = document.getElementById('category-filter').value;
                const country = document.getElementById('country-filter').value;
                
                ui.grid.innerHTML = ''; 
                
                if (!currentUser) {
                    return;
                }

                const filtered = allMaterials.filter(material => {
                    const countryMatch = country === 'all' || (material.location || '').toLowerCase().includes(country.toLowerCase());
                    const categoryMatch = category === 'all' || material.category === category;
                    // CORRECTION ICI: On cherche dans `supplierName` ET `supplier` pour la compatibilité
                    const supplierInfo = material.supplierName || material.supplier || '';
                    const searchMatch = search === '' || (material.name || '').toLowerCase().includes(search) || supplierInfo.toLowerCase().includes(search);
                    return countryMatch && categoryMatch && searchMatch;
                });
                
                if(filtered.length === 0) {
                    ui.grid.innerHTML = `<p class="col-span-full text-center">Aucun matériau ne correspond à votre recherche.</p>`;
                    return;
                }
                filtered.forEach(material => {
                    const card = document.createElement('div');
                    card.className = 'bg-[var(--color-card-bg)] rounded-lg shadow-lg overflow-hidden flex flex-col justify-between transform hover:-translate-y-2 transition duration-300 fade-in';
                    const isOwner = currentUser && material.sellerId === currentUser.uid;
                    const supplierInfo = material.supplierName || material.supplier || 'N/A';
                    let actionButtonHTML = `<div class="p-4 bg-[var(--color-dark-bg)]"><button data-buy-id="${material.id}" class="bg-[var(--color-primary)] btn-primary-text font-bold py-2 px-4 rounded-full w-full">Acheter ce lot</button></div>`;
                    if (isOwner) {
                         actionButtonHTML = `<div class="p-4 bg-[var(--color-dark-bg)]"><div class="tag-own text-center font-bold py-2 px-4 rounded-full w-full">Votre lot</div></div>`;
                    }
                    card.innerHTML = `
                        <div>
                            <img src="https://placehold.co/600x400/112f3b/5affb5?text=${encodeURIComponent(material.category)}" alt="${material.name}" class="w-full h-40 object-cover">
                            <div class="p-5">
                                <span class="tag text-xs font-semibold py-1 px-3 rounded-full">${material.category}</span>
                                <h3 class="text-lg font-bold mt-3">${material.name}</h3>
                                <p class="text-sm mt-2 opacity-80"><i class="fas fa-user mr-2"></i>${supplierInfo}</p>
                                <p class="text-sm mt-1 opacity-80"><i class="fas fa-map-marker-alt mr-2"></i>${material.location}</p>
                                <div class="mt-4 flex justify-between items-center">
                                    <div><p class="text-sm font-semibold">${material.quantity} ${material.unit}</p><p class="text-xs opacity-80">disponibles</p></div>
                                    <div class="text-right"><p class="text-lg font-bold text-[var(--color-primary)]">${new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(material.price || 0)}</p><p class="text-xs opacity-80">par ${material.unit}</p></div>
                                </div>
                            </div>
                        </div>
                        ${actionButtonHTML}`;
                    ui.grid.appendChild(card);
                });
            }

            // --- LISTENERS ---
            onAuthStateChanged(auth, ui.update);
            
            document.addEventListener('click', e => {
                const target = e.target;
                if(target.closest('[data-close-modal]')) document.getElementById(target.closest('[data-close-modal]').dataset.closeModal).classList.add('hidden');
                if(target.closest('#open-login-modal-btn')) document.getElementById('login-modal').classList.remove('hidden');
                if(target.closest('#open-register-modal-btn')) document.getElementById('register-modal').classList.remove('hidden');
                if(target.closest('#open-sell-modal-btn')) document.getElementById('sell-material-modal').classList.remove('hidden');
                if(target.closest('#logout-btn')) signOut(auth);
                if(target.closest('#open-account-btn')) openAccountModal();
                if(target.closest('[data-buy-id]')) {
                    const materialId = target.closest('[data-buy-id]').dataset.buyId;
                    const material = allMaterials.find(m => m.id === materialId);
                    const modal = document.getElementById('buy-confirmation-modal');
                    modal.querySelector('#buy-confirmation-text').textContent = `Acheter "${material.name}" pour ${new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(material.price || 0)} ?`;
                    modal.querySelector('#confirm-buy-btn').dataset.materialId = materialId;
                    modal.classList.remove('hidden');
                }
                if(target.closest('#confirm-buy-btn')) buyMaterial(target.closest('#confirm-buy-btn').dataset.materialId);
            });
            
            document.getElementById('search-input').addEventListener('input', displayMaterials);
            document.getElementById('category-filter').addEventListener('change', displayMaterials);
            document.getElementById('country-filter').addEventListener('change', displayMaterials);
            
            // --- FORM SUBMISSIONS ---
            document.getElementById('register-form').addEventListener('submit', async e => {
                e.preventDefault();
                const name = e.target['register-name'].value;
                const email = e.target['register-email'].value;
                const password = e.target['register-password'].value;
                try {
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    await setDoc(doc(db, "users", cred.user.uid), { name, email, createdAt: serverTimestamp() });
                    document.getElementById('register-modal').classList.add('hidden');
                    e.target.reset();
                } catch (error) { document.getElementById('register-error').textContent = error.message; }
            });

            document.getElementById('login-form').addEventListener('submit', async e => {
                e.preventDefault();
                const email = e.target['login-email'].value;
                const password = e.target['login-password'].value;
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                    document.getElementById('login-modal').classList.add('hidden');
                    e.target.reset();
                } catch (error) { document.getElementById('login-error').textContent = "Email ou mot de passe incorrect."; }
            });

            document.getElementById('add-material-form').addEventListener('submit', async e => {
                e.preventDefault();
                if(!currentUser) return;
                const newMaterial = {
                    name: e.target['material-name'].value, category: e.target['material-category'].value,
                    quantity: parseFloat(e.target['material-quantity'].value), unit: e.target['material-unit'].value,
                    price: parseFloat(e.target['material-price'].value), location: e.target['material-location'].value,
                    sellerId: currentUser.uid, supplierName: currentUserData.name, createdAt: serverTimestamp()
                };
                try {
                    await addDoc(collection(db, 'materials'), newMaterial);
                    document.getElementById('sell-material-modal').classList.add('hidden');
                    e.target.reset();
                } catch(error) { document.getElementById('sell-form-error').textContent = error.message; }
            });

            async function buyMaterial(materialId) {
                if(!currentUser) return;
                const materialRef = doc(db, 'materials', materialId);
                const materialDoc = await getDoc(materialRef);
                if (!materialDoc.exists()) { console.error("Lot introuvable!"); return; }
                const batch = writeBatch(db);
                const purchaseRef = doc(collection(db, 'purchases'));
                batch.set(purchaseRef, { ...materialDoc.data(), buyerId: currentUser.uid, purchaseDate: serverTimestamp() });
                batch.delete(materialRef);
                await batch.commit();
                document.getElementById('buy-confirmation-modal').classList.add('hidden');
            }

            async function openAccountModal() {
                const accountModal = document.getElementById('account-modal');
                let salesHTML = `<div class="p-2 text-center text-gray-400">Vous n'avez aucun lot en vente.</div>`;
                let purchasesHTML = `<div class="p-2 text-center text-gray-400">Vous n'avez réalisé aucun achat.</div>`;
                
                try {
                    const salesQuery = query(collection(db, "materials"), where("sellerId", "==", currentUser.uid));
                    const salesSnapshot = await getDocs(salesQuery);
                    if(!salesSnapshot.empty) {
                        salesHTML = salesSnapshot.docs.map(d => {
                            const data = d.data();
                            return `<div class="p-3 bg-[var(--color-dark-bg)] rounded-lg flex justify-between items-center"><span>${data.name} - ${data.quantity} ${data.unit}</span><span class="font-bold text-[var(--color-primary)]">${new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(data.price)}</span></div>`
                        }).join('');
                    }

                    const purchasesQuery = query(collection(db, "purchases"), where("buyerId", "==", currentUser.uid));
                    const purchasesSnapshot = await getDocs(purchasesQuery);
                    if(!purchasesSnapshot.empty) {
                        purchasesHTML = purchasesSnapshot.docs.map(d => {
                            const data = d.data();
                            const supplierInfo = data.supplierName || data.supplier || 'N/A';
                            return `<div class="p-3 bg-[var(--color-dark-bg)] rounded-lg flex justify-between items-center"><span>${data.name} (vendu par ${supplierInfo})</span><span class="font-bold text-[var(--color-primary)]">${new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(data.price)}</span></div>`
                        }).join('');
                    }
                } catch (error) {
                    console.error("Erreur lors de la récupération des données du compte:", error);
                    salesHTML = `<div class="p-2 text-red-400 text-center">Erreur. Avez-vous créé les index dans Firestore ? Voir la console pour les détails.</div>`;
                    purchasesHTML = ``;
                }
                
                accountModal.innerHTML = `
                    <div class="bg-[var(--color-secondary-bg)] rounded-lg shadow-2xl p-8 w-full max-w-3xl modal-content max-h-[80vh] overflow-y-auto">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-bold">Mon Compte</h2>
                            <button data-close-modal="account-modal" class="text-gray-400 hover:text-white text-2xl">&times;</button>
                        </div>
                        <div class="space-y-6">
                            <div><h3 class="font-bold text-xl mb-2 border-b border-gray-600 pb-2">Mes Ventes</h3><div class="space-y-2">${salesHTML}</div></div>
                            <div><h3 class="font-bold text-xl mb-2 border-b border-gray-600 pb-2">Mes Achats</h3><div class="space-y-2">${purchasesHTML}</div></div>
                        </div>
                    </div>`;
                accountModal.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
