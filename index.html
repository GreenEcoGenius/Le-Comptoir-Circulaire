<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Comptoir Circulaire - GreenEcoGenius</title>
    
    <!-- Tailwind CSS & Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" xintegrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Stripe.js (pour le futur) -->
    <script src="https://js.stripe.com/v3/"></script>

    <style>
        :root {
            --color-bg: #FFFFFF; 
            --color-bg-alt: #f8f9fa;
            --color-card-bg: #FFFFFF;
            --color-text: #333333;
            --color-text-secondary: #888888;
            /* NOUVELLE PALETTE */
            --color-primary: #14B8A6; /* Bleu turquoise (Teal 500) */
            --color-primary-darker: #0F766E; /* Teal 700 */
            --color-accent: #2A833D; /* Vert foncé original */
            --color-border: #eef2f5;
            --color-danger: #e74c3c;
            --font-main: 'Poppins', sans-serif;
        }
        body { font-family: var(--font-main); background-color: var(--color-bg-alt); color: var(--color-text); }
        .btn-primary { background-color: var(--color-primary); color: white; }
        .btn-primary:hover { background-color: var(--color-primary-darker); }
        .tag { background-color: rgba(42, 131, 61, 0.1); color: var(--color-accent) !important; font-weight: 600; }
        .tag-own { background-color: var(--color-accent); color: white !important; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .modal-backdrop { animation: fadeIn 0.3s ease-in-out; }
        .modal-content { animation: slideInUp 0.4s ease-in-out; }
        @keyframes slideInUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        .form-input, .form-select { background-color: #f8f9fa !important; color: #333333 !important; border: 1px solid var(--color-border); }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-message-box { background-color: #fffbe6; border: 1px solid #fde68a; color: #92400e; padding: 1rem; border-radius: 0.5rem; }
    </style>
</head>
<body id="le-comptoir-app" class="relative">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-40">
        <div class="container mx-auto px-4 md:px-6 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-xl md:text-2xl font-bold text-gray-800">Le Comptoir Circulaire</h1>
                <p class="text-xs md:text-sm text-gray-500">Par GreenEcoGenius</p>
            </div>
            <div id="auth-container" class="flex items-center gap-2 md:gap-4">
                <div id="logged-out-view">
                    <button data-modal-target="login-modal" class="font-semibold text-gray-600 hover:text-[var(--color-primary)] transition duration-300 px-2 md:px-4">Connexion</button>
                    <button data-modal-target="register-modal" class="btn-primary font-bold py-2 px-4 md:px-6 rounded-full transition duration-300 text-sm md:text-base">Inscription</button>
                </div>
                <div id="logged-in-view" class="hidden items-center gap-2 md:gap-4">
                    <button data-modal-target="sell-material-modal" class="btn-primary font-bold py-2 px-4 md:px-6 rounded-full transition duration-300 flex items-center text-sm md:text-base"><i class="fas fa-plus-circle mr-2"></i><span class="hidden md:inline">Vendre</span></button>
                    <div class="relative dropdown">
                        <button id="account-menu-btn" class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center text-xl font-bold text-gray-600 uppercase"></button>
                        <div id="account-dropdown-menu" class="dropdown-menu absolute right-0 mt-2 w-48 bg-white rounded-md shadow-xl z-20 hidden">
                            <a href="#" id="open-account-btn" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Mon Compte</a>
                            <a href="#" id="logout-btn" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Déconnexion</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 md:px-6 py-8">
        <div class="bg-white p-4 md:p-6 rounded-lg shadow-sm border border-[var(--color-border)] mb-8">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6">
                <div class="md:col-span-2"><label for="search-input" class="block mb-2 text-sm font-medium text-gray-700">Rechercher</label><div class="relative"><span class="absolute inset-y-0 left-0 flex items-center pl-3"><i class="fas fa-search text-gray-400"></i></span><input type="text" id="search-input" class="w-full form-input rounded-lg py-2 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)]" placeholder="Ex: Plastique HDPE..."></div></div>
                <div><label for="category-filter" class="block mb-2 text-sm font-medium text-gray-700">Catégorie</label><select id="category-filter" class="w-full form-select rounded-lg py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)]"><option value="all">Toutes</option><option value="Plastiques">Plastiques</option><option value="Métaux">Métaux</option><option value="Papiers/Cartons">Papiers/Cartons</option><option value="Verre">Verre</option><option value="Bois">Bois</option></select></div>
                <div><label for="country-filter" class="block mb-2 text-sm font-medium text-gray-700">Pays</label><select id="country-filter" class="w-full form-select rounded-lg py-2 px-3 focus:outline-none focus:ring-2 focus:ring-[var(--color-primary)]"><option value="all">Tous</option><option value="France">France</option><option value="Allemagne">Allemagne</option><option value="Italie">Italie</option><option value="Espagne">Espagne</option></select></div>
            </div>
        </div>
        <div class="flex flex-col lg:flex-row gap-8">
            <div class="w-full lg:w-2/3">
                <h2 class="text-2xl font-semibold mb-4 text-gray-800">Stock disponible</h2>
                <div id="materials-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6 min-h-[300px]"><div id="loading-container" class="col-span-full text-center text-gray-500 p-8"><p id="loading-indicator">Chargement des lots...</p></div></div>
            </div>
            <aside class="w-full lg:w-1/3">
                <div class="bg-white p-4 md:p-6 rounded-lg shadow-sm border border-[var(--color-border)] sticky top-24"><h3 class="text-xl font-semibold mb-4 text-gray-800">Répartition du Marché</h3><div class="h-64 flex items-center justify-center"><canvas id="market-chart"></canvas></div></div>
            </aside>
        </div>
    </main>
    
    <!-- Modals -->
    <div id="modal-container">
        <!-- All modals will be injected here by JS or defined statically -->
        <div id="sell-material-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-center items-center p-4 modal-backdrop"><div class="bg-white rounded-lg shadow-2xl p-8 w-full max-w-2xl modal-content"><div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold text-gray-800">Vendre un nouveau lot</h2><button class="close-modal-btn text-gray-400 hover:text-gray-800 text-2xl">&times;</button></div><form id="add-material-form" class="space-y-4"><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label for="material-name" class="block mb-2 text-sm text-gray-700">Nom du matériau</label><input type="text" id="material-name" required class="form-input w-full rounded-lg p-2"></div><div><label for="material-category" class="block mb-2 text-sm text-gray-700">Catégorie</label><select id="material-category" required class="form-select w-full rounded-lg p-2"><option value="Plastiques">Plastiques</option><option value="Métaux">Métaux</option><option value="Papiers/Cartons">Papiers/Cartons</option><option value="Verre">Verre</option><option value="Bois">Bois</option></select></div><div><label for="material-quantity" class="block mb-2 text-sm text-gray-700">Quantité</label><input type="number" step="0.01" id="material-quantity" required class="form-input w-full rounded-lg p-2"></div><div><label for="material-unit" class="block mb-2 text-sm text-gray-700">Unité</label><select id="material-unit" required class="form-select w-full rounded-lg p-2"><option value="tonnes">tonnes</option><option value="kg">kg</option><option value="m³">m³</option></select></div><div><label for="material-price" class="block mb-2 text-sm text-gray-700">Prix (€)</label><input type="number" step="0.01" id="material-price" required class="form-input w-full rounded-lg p-2"></div><div><label for="material-location" class="block mb-2 text-sm text-gray-700">Localisation</label><input type="text" id="material-location" required class="form-input w-full rounded-lg p-2"></div></div><div class="mt-8 flex justify-end"><button id="submit-material-btn" type="submit" class="btn-primary font-bold py-3 px-8 rounded-full w-48 text-center flex items-center justify-center"><span class="btn-text">Mettre en vente</span><span class="btn-spinner hidden ml-2"><i class="fas fa-spinner spinner"></i></span></button></div><p id="sell-form-error" class="text-red-500 mt-4 text-right"></p></form></div></div>
        <div id="login-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-center items-center p-4 modal-backdrop"><div class="bg-white rounded-lg shadow-2xl p-8 w-full max-w-md modal-content"><div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold text-gray-800">Connexion</h2><button class="close-modal-btn text-gray-400 hover:text-gray-800 text-2xl">&times;</button></div><form id="login-form"><div class="space-y-4"><div><label for="login-email" class="block mb-2 text-sm">Email</label><input type="email" id="login-email" required class="form-input w-full rounded-lg p-2"></div><div><label for="login-password" class="block mb-2 text-sm">Mot de passe</label><input type="password" id="login-password" required class="form-input w-full rounded-lg p-2"></div></div><div class="mt-8"><button type="submit" class="btn-primary font-bold py-3 px-8 rounded-full w-full">Se connecter</button></div><p id="login-error" class="text-red-500 mt-4 text-center"></p></form></div></div>
        <div id="register-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-center items-center p-4 modal-backdrop"><div class="bg-white rounded-lg shadow-2xl p-8 w-full max-w-md modal-content"><div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold text-gray-800">Créer un compte</h2><button class="close-modal-btn text-gray-400 hover:text-gray-800 text-2xl">&times;</button></div><form id="register-form"><div class="space-y-4"><div><label for="register-name" class="block mb-2 text-sm">Nom ou Entreprise</label><input type="text" id="register-name" required class="form-input w-full rounded-lg p-2"></div><div><label for="register-email" class="block mb-2 text-sm">Email</label><input type="email" id="register-email" required class="form-input w-full rounded-lg p-2"></div><div><label for="register-password" class="block mb-2 text-sm">Mot de passe (6+ car.)</label><input type="password" id="register-password" required class="form-input w-full rounded-lg p-2"></div></div><div class="mt-8"><button type="submit" class="btn-primary font-bold py-3 px-8 rounded-full w-full">S'inscrire</button></div><p id="register-error" class="text-red-500 mt-4 text-center"></p></form></div></div>
        <div id="account-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-center items-center p-4 modal-backdrop"></div>
        <div id="message-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-center items-center p-4 modal-backdrop"><div class="bg-white rounded-lg shadow-2xl p-8 w-full max-w-md modal-content text-center"><h2 id="message-modal-title" class="text-2xl font-bold mb-4 text-gray-800"></h2><p id="message-modal-text" class="mb-6 text-gray-600"></p><div class="flex justify-center"><button class="close-modal-btn btn-primary font-bold py-2 px-6 rounded-full">OK</button></div></div></div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, getDoc, setDoc, query, where, getDocs, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        const firebaseConfig = {
          apiKey: "AIzaSyB0tQRqJaOgqIi7Sbk0v1JPJZbSabzMmBo",
          authDomain: "greenecogenius.firebaseapp.com",
          projectId: "greenecogenius",
          storageBucket: "greenecogenius.firebasestorage.app",
          messagingSenderId: "201115761499",
          appId: "1:201115761499:web:87f9961ff40f8a5e04387e",
        };
        const appId = "greenecogenius";

        const state = { allMaterials: [], currentUser: null, currentUserData: {}, marketChart: null };
        const UI = {
            grid: document.getElementById('materials-grid'),
            chartCanvas: document.getElementById('market-chart'),
            searchInput: document.getElementById('search-input'),
            categoryFilter: document.getElementById('category-filter'),
            countryFilter: document.getElementById('country-filter'),
            loggedOutView: document.getElementById('logged-out-view'),
            loggedInView: document.getElementById('logged-in-view'),
            accountMenuBtn: document.getElementById('account-menu-btn'),
        };

        function displayError(msg, details = '') { UI.grid.innerHTML = `<div class="col-span-full error-message-box"><h3 class="font-bold text-lg">Oops! Une erreur est survenue.</h3><p class="mt-2">${msg}</p><p class="mt-2 text-sm font-mono bg-yellow-100 p-2 rounded">${details}</p></div>`; }
        function toggleModal(modalId, show) { const modal = document.getElementById(modalId); if (modal) modal.classList.toggle('hidden', !show); }
        function showMessage(title, text) { document.getElementById('message-modal-title').textContent = title; document.getElementById('message-modal-text').textContent = text; toggleModal('message-modal', true); }

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);
            main(db, auth);
        } catch (error) {
            console.error("Firebase Init Error:", error);
            displayError("La configuration de Firebase est incorrecte.", `Message: ${error.message}.`);
        }
        
        function main(db, auth) {
            const materialsCol = collection(db, 'artifacts', appId, 'public', 'data', 'materials');
            const usersCol = collection(db, 'artifacts', appId, 'users');

            onSnapshot(materialsCol, (snapshot) => {
                state.allMaterials = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                filterAndDisplay();
            }, (error) => {
                displayError("Impossible de lire la base de données.", `Message: ${error.message}.`);
            });

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    state.currentUser = user;
                    const userDoc = await getDoc(doc(usersCol, user.uid));
                    state.currentUserData = userDoc.exists() ? userDoc.data() : {};
                    const name = state.currentUserData.name || '';
                    UI.accountMenuBtn.textContent = name ? name[0].toUpperCase() : '👤';
                    UI.loggedOutView.classList.add('hidden');
                    UI.loggedInView.classList.remove('hidden');
                } else {
                    state.currentUser = null; state.currentUserData = {};
                    UI.loggedOutView.classList.remove('hidden'); UI.loggedInView.classList.add('hidden');
                }
                filterAndDisplay();
            });

            setupEventListeners(db, auth);
        }
        
        function setupEventListeners(db, auth) {
            ['input', 'change'].forEach(evt => {
                UI.searchInput.addEventListener(evt, filterAndDisplay);
                UI.categoryFilter.addEventListener(evt, filterAndDisplay);
                UI.countryFilter.addEventListener(evt, filterAndDisplay);
            });

            document.body.addEventListener('click', (e) => {
                const target = e.target;
                if (target.closest('[data-modal-target]')) toggleModal(target.closest('[data-modal-target]').dataset.modalTarget, true);
                if (target.closest('.close-modal-btn')) toggleModal(target.closest('.modal-backdrop').id, false);
                if (target.closest('#account-menu-btn')) document.getElementById('account-dropdown-menu').classList.toggle('hidden');
                else if (!target.closest('.dropdown')) document.getElementById('account-dropdown-menu').classList.add('hidden');
                if (target.closest('#logout-btn')) { signOut(auth); document.getElementById('account-dropdown-menu').classList.add('hidden'); }
                if (target.closest('#open-account-btn')) { openAccountModal(db); document.getElementById('account-dropdown-menu').classList.add('hidden'); }
                if (target.closest('[data-buy-id]')) { buyMaterial(db, target.closest('[data-buy-id]').dataset.buyId); }
            });

            document.getElementById('register-form').addEventListener('submit', async e => {
                e.preventDefault();
                const name = e.target['register-name'].value, email = e.target['register-email'].value, password = e.target['register-password'].value;
                try {
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    await setDoc(doc(db, 'artifacts', appId, 'users', cred.user.uid), { name, email, createdAt: serverTimestamp() });
                    toggleModal('register-modal', false); e.target.reset();
                } catch (error) { document.getElementById('register-error').textContent = 'Erreur: Email déjà utilisé ou mot de passe invalide.'; }
            });

            document.getElementById('login-form').addEventListener('submit', async e => {
                e.preventDefault();
                const email = e.target['login-email'].value, password = e.target['login-password'].value;
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                    toggleModal('login-modal', false); e.target.reset();
                } catch (error) { document.getElementById('login-error').textContent = 'Email ou mot de passe incorrect.'; }
            });

            document.getElementById('add-material-form').addEventListener('submit', async e => {
                e.preventDefault();
                if (!state.currentUser) return;
                const form = e.target;
                const newMaterial = {
                    name: form['material-name'].value, category: form['material-category'].value, quantity: parseFloat(form['material-quantity'].value),
                    unit: form['material-unit'].value, price: parseFloat(form['material-price'].value), location: form['material-location'].value,
                    sellerId: state.currentUser.uid, supplierName: state.currentUserData.name || 'Anonyme', createdAt: serverTimestamp()
                };
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'materials'), newMaterial);
                    toggleModal('sell-material-modal', false); form.reset();
                } catch (error) { document.getElementById('sell-form-error').textContent = 'Erreur lors de l\'ajout du lot.'; }
            });
        }

        function filterAndDisplay() {
            const search = UI.searchInput.value.toLowerCase(), category = UI.categoryFilter.value, country = UI.countryFilter.value;
            const materials = state.allMaterials.filter(m => 
                (country === 'all' || (m.location || '').toLowerCase().includes(country.toLowerCase())) &&
                (category === 'all' || m.category === category) &&
                (search === '' || (m.name || '').toLowerCase().includes(search) || (m.supplierName || '').toLowerCase().includes(search))
            );
            renderMaterials(materials);
            updateMarketChart(materials);
        }

        function renderMaterials(materials) {
            UI.grid.innerHTML = '';
            if (materials.length === 0) { UI.grid.innerHTML = '<p class="col-span-full text-center text-gray-500 p-8">Aucun matériau ne correspond à votre recherche.</p>'; return; }
            const co2Factors = { "Plastiques": 2100, "Métaux": 6500, "Papiers/Cartons": 800, "Verre": 400, "Bois": 50 };
            materials.forEach(m => {
                const card = document.createElement('div');
                card.className = 'bg-white border border-gray-200 rounded-lg shadow-sm flex flex-col justify-between fade-in';
                const isOwner = state.currentUser && m.sellerId === state.currentUser.uid;
                const saved = ((co2Factors[m.category] || 0) * (m.unit === 'tonnes' ? m.quantity : m.quantity / 1000)).toFixed(0);
                let btn = `<button class="bg-gray-200 text-gray-500 font-bold py-2 px-4 rounded-full w-full text-sm" disabled>Connectez-vous</button>`;
                if (state.currentUser) btn = isOwner ? `<div class="tag-own text-center font-bold py-2 px-4 rounded-full w-full text-sm">Votre lot</div>` : `<button data-buy-id="${m.id}" class="btn-primary font-bold py-2 px-4 rounded-full w-full text-sm">Acheter ce lot</button>`;
                card.innerHTML = `<div><img src="https://placehold.co/600x400/14B8A6/FFFFFF?text=${encodeURIComponent(m.category)}" alt="${m.name}" class="w-full h-40 object-cover"><div class="p-4"><span class="tag text-xs py-1 px-3 rounded-full">${m.category}</span><h3 class="text-lg font-bold mt-3">${m.name}</h3><p class="text-sm mt-2 text-gray-600"><i class="fas fa-user mr-2 text-gray-400"></i>${m.supplierName || 'N/A'}</p><p class="text-sm mt-1 text-gray-600"><i class="fas fa-map-marker-alt mr-2 text-gray-400"></i>${m.location}</p><div class="mt-4 flex justify-between items-center"><div><p class="text-sm font-semibold">${m.quantity} ${m.unit}</p></div><div class="text-right"><p class="text-lg font-bold text-[var(--color-accent)]">${new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(m.price||0)}</p></div></div></div></div><div class="p-4 bg-gray-50 border-t"><p class="text-sm font-semibold text-[var(--color-accent)] flex items-center justify-center"><i class="fas fa-leaf mr-2"></i>Économie: ${saved} kg CO₂</p></div><div class="p-4 bg-gray-50">${btn}</div>`;
                UI.grid.appendChild(card);
            });
        }

        function updateMarketChart(materials) {
            const counts = materials.reduce((a, m) => { a[m.category] = (a[m.category] || 0) + 1; return a; }, {});
            const labels = Object.keys(counts), data = Object.values(counts);
            const colors = ['#14B8A6', '#2A833D', '#0d9488', '#84E197', '#C1F0F6'];
            if (state.marketChart) {
                state.marketChart.data.labels = labels;
                state.marketChart.data.datasets[0].data = data;
                state.marketChart.data.datasets[0].backgroundColor = colors.slice(0, labels.length);
                state.marketChart.update();
            } else {
                state.marketChart = new Chart(UI.chartCanvas, { type: 'doughnut', data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: 'var(--color-bg-alt)' }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { family: 'Poppins' }, boxWidth: 12 } } }, cutout: '60%' } });
            }
        }
        
        async function openAccountModal(db) {
            if(!state.currentUser) return;
            const uid = state.currentUser.uid;
            let salesHTML = `<div class="p-2 text-center text-gray-500">Aucun lot en vente.</div>`;
            let purchasesHTML = `<div class="p-2 text-center text-gray-500">Aucun achat réalisé.</div>`;
            try {
                const salesQ = query(collection(db, 'artifacts', appId, 'public', 'data', 'materials'), where("sellerId", "==", uid));
                const salesSnap = await getDocs(salesQ);
                if(!salesSnap.empty) salesHTML = salesSnap.docs.map(d => `<div class="p-3 bg-gray-50 border rounded-lg flex justify-between"><span>${d.data().name}</span><span class="font-bold">${new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(d.data().price)}</span></div>`).join('');
                
                // Note: La requête sur 'purchases' nécessitera un index composite dans Firestore.
                const purchasesQ = query(collection(db, 'artifacts', appId, 'public', 'data', 'purchases'), where("buyerId", "==", uid));
                const purchasesSnap = await getDocs(purchasesQ);
                if(!purchasesSnap.empty) purchasesHTML = purchasesSnap.docs.map(d => `<div class="p-3 bg-gray-50 border rounded-lg flex justify-between"><span>${d.data().name} (de ${d.data().supplierName})</span><span class="font-bold">${new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(d.data().price)}</span></div>`).join('');

            } catch(e) {
                console.error("Erreur de requête (index manquant?):", e.message);
                salesHTML = `<div class="p-2 text-center text-red-600">Erreur au chargement des ventes. Un index Firestore est peut-être requis.</div>`;
            }
            const modalHTML = `<div class="bg-white rounded-lg shadow-2xl p-8 w-full max-w-3xl modal-content max-h-[80vh] overflow-y-auto"><div class="flex justify-between items-center mb-6"><h2 class="text-2xl font-bold text-gray-800">Mon Compte</h2><button class="close-modal-btn text-gray-400 hover:text-gray-800 text-2xl">&times;</button></div><div class="space-y-6"><div><h3 class="font-bold text-xl mb-2 border-b pb-2">Mes Ventes</h3><div class="space-y-2">${salesHTML}</div></div><div><h3 class="font-bold text-xl mb-2 border-b pb-2">Mes Achats</h3><div class="space-y-2">${purchasesHTML}</div></div></div></div>`;
            document.getElementById('account-modal').innerHTML = modalHTML;
            toggleModal('account-modal', true);
        }

        function buyMaterial(db, materialId) {
            // Pour l'instant, cette fonction affiche un message.
            // La logique Stripe (via Cloud Functions) sera ajoutée ici.
            const material = state.allMaterials.find(m => m.id === materialId);
            showMessage("Achat (Simulation)", `Vous êtes sur le point d'acheter le lot : "${material.name}". Cette fonctionnalité sera bientôt connectée à un système de paiement.`);
        }

    </script>
</body>
</html>
